name: Run tests
on:
  push:
    paths:
      - .github/workflows/tests.yml
      - pyproject.toml
      - pixi.lock
      - '**.py'
      - data/**
jobs:
  build:
    name: Build package and run tests
    strategy:
      matrix:
        python-version: ["3.14"]
        os: ["ubuntu-latest", "osx-latest", "windows-latest"]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout repo
      uses: actions/checkout@v6
    - name: Set up pixi and run tests
      run: |
        curl -fsSL https://pixi.sh/install.sh | sh
        export PATH="$HOME/.pixi/bin:$PATH"
        pixi install
        pixi run fig01_trends.py
        pixi run fig02_regional_clusters.py
        pixi run fig03_network.py
        pixi run fig04_ff_vs_wlsq.py
        